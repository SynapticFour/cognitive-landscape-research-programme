name: Link and catalog check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-retries 3
            --exclude '^mailto:'
            --exclude '^https://github.com/.+/issues/new'
            './**/*.md'
          fail: true
          token: ${{ github.token }}

  catalog:
    name: Catalog and paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate catalog.yaml
        run: python3 scripts/validate-catalog.py
